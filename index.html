<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Afiche UCR PRO</title>

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="poster">

    <div class="titulo">

        <span class="signo signo-left">¡</span>

        <span class="box azul sede">LA SEDE</span>
        <span class="box blanco te">TE</span>
        <span class="box morado acompana">ACOMPAÑA</span>

        <span class="signo signo-right">!</span>

    </div>

    <div class="mensaje">
        <p>El respeto no se negocia</p>
        <h2>¡Pará ya de acosar!</h2>
    </div>

    <div class="qr">
        <p>Si necesitas ayuda,<br>escanea este QR.</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=UCR">
    </div>

    <div class="personas">
        <img src="img/Gato1.png" alt="Gato 1">
        <img src="img/Gato2.png" alt="Gato 2">
    </div>

</div>

</body>
</html>
