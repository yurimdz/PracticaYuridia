<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Diseños UCR Animados</title>

    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ================= AFICHE ================= -->
<div class="poster">

    <div class="titulo">
        <span class="signo signo-left">¡</span>
        <span class="box azul sede">LA SEDE</span>
        <span class="box blanco te">TE</span>
        <span class="box morado acompana">ACOMPAÑA</span>
        <span class="signo signo-right">!</span>
    </div>

    <div class="mensaje">
        <p>El respeto no se negocia</p>
        <h2>¡Pará ya de acosar!</h2>
    </div>

    <div class="qr">
        <p>Si necesitas ayuda,<br>escanea este QR.</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=UCR" alt="QR">
    </div>

    <!-- 📌 AQUÍ PONES TUS IMÁGENES -->
    <div class="personas">
        <img src="img/persona1.png" alt="Persona 1">
        <img src="img/persona2.png" alt="Persona 2">
    </div>

</div>

<!-- ================= ROTULO ================= -->
<div class="rotulo">

    <div class="fila">Aulas 5, 6, 7 <span>➜</span></div>
    <div class="linea"></div>

    <div class="fila">Apoyo Informático <span>➜</span></div>
    <div class="linea"></div>

    <div class="fila">Servidores <span>➜</span></div>
    <div class="linea"></div>

    <div class="fila">Laboratorio 1 y 2 <span>➜</span></div>
    <div class="linea"></div>

    <div class="fila">Coordinación Informática Empresarial <span>➜</span></div>

    <div class="footer">
        <h2>UCR</h2>
    </div>

</div>

</body>
</html>
